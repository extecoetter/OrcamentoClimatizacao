<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Proposta Comercial</title>

  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --brand:#1f6feb;
      --brand-strong:#0b5ed7;
      --shadow: 0 10px 30px rgba(17,24,39,.08);
      --radius:18px;
      --pdf-soft-blue:#eaf2ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width: 920px;
      margin: 18px auto 90px;
      padding: 0 14px;
    }

    /* APP TOP BAR (SEM LOGO) */
    .appbar{
      background: linear-gradient(180deg, #2f80ff 0%, #1f6feb 100%);
      color:#fff;
      padding: 14px;
      border-radius: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    .appbar h1{
      margin:0;
      font-size: 18px;
      font-weight: 900;
      letter-spacing:.2px;
    }
    .appbar p{margin:6px 0 0; opacity:.9; font-size: 13px}

    .section-title{
      display:flex;
      align-items:center;
      gap:10px;
      margin: 14px 2px 10px;
      font-weight:900;
      color: #0f172a;
      letter-spacing:.3px;
    }
    .section-title small{
      margin-left:auto;
      font-weight:800;
      color: var(--brand);
      background:#eaf2ff;
      padding: 6px 10px;
      border-radius: 999px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .grid{ display:grid; gap:10px; }
    .grid.cols-2{ grid-template-columns: 1fr 1fr; }
    @media (max-width:700px){
      .grid.cols-2{ grid-template-columns: 1fr; }
    }

    label{
      display:block;
      font-size: 12px;
      font-weight:900;
      color: var(--muted);
      margin: 2px 0 6px;
      text-transform: uppercase;
      letter-spacing:.4px;
    }
    input, textarea, select{
      width:100%;
      padding: 14px 14px;
      border-radius: 14px;
      border:1px solid var(--line);
      outline:none;
      font-size: 16px;
      background:#fff;
    }
    textarea{ min-height: 90px; resize: vertical; }

    /* SERVICES */
    .service{
      border:1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      background:#fff;
      display:grid;
      gap:10px;
    }
    .service-top{
      display:grid;
      grid-template-columns: 1fr 44px;
      gap:10px;
      align-items:center;
    }
    .trash{
      width:44px;height:44px;
      border-radius: 14px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      font-size: 18px;
    }
    .service-bottom{
      display:grid;
      grid-template-columns: 1fr 140px;
      gap:10px;
      align-items:center;
    }
    @media (max-width:440px){
      .service-bottom{ grid-template-columns: 1fr; }
    }

    .money{ position:relative; }
    .money span{
      position:absolute;
      left:14px;
      top:50%;
      transform: translateY(-50%);
      font-weight:900;
      color: var(--muted);
    }
    .money input{
      padding-left: 48px;
      font-weight: 900;
    }

    .qty{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      border:1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      height: 52px;
    }
    .qty button{
      width:44px;height:38px;
      border-radius: 12px;
      border:1px solid var(--line);
      background:#fff;
      font-size: 18px;
      cursor:pointer;
      font-weight:900;
    }
    .qty b{ min-width: 22px; text-align:center; display:inline-block; }

    .add{
      border:2px dashed #c7d2fe;
      color:#334155;
      font-weight:900;
      background:#f8fafc;
      width:100%;
      border-radius: 18px;
      padding: 16px;
      cursor:pointer;
      display:flex;
      gap:10px;
      justify-content:center;
      align-items:center;
      letter-spacing:.2px;
      margin-top: 10px;
    }
    .add .plus{
      width:28px;height:28px;
      border-radius: 999px;
      border:1px solid var(--line);
      display:grid;
      place-items:center;
      background:#fff;
      font-weight:900;
    }

    .totals{
      display:grid;
      gap:8px;
      margin-top: 12px;
      border-top:1px solid var(--line);
      padding-top: 12px;
    }
    .totals .grand{
      display:flex;
      justify-content:space-between;
      align-items:baseline;
      font-weight: 1000;
      color:#0b1220;
      margin-top: 4px;
    }
    .totals .grand .value{
      font-size: 30px;
      letter-spacing:.3px;
    }

    /* ACTION BAR */
    .actions{
      position: fixed;
      left:0; right:0; bottom:0;
      background: rgba(243,246,251,.9);
      backdrop-filter: blur(10px);
      border-top:1px solid var(--line);
      padding: 10px 14px;
    }
    .actions .inner{
      max-width:920px;
      margin:0 auto;
      display:flex;
      gap:10px;
    }
    .btn{
      flex:1;
      padding: 14px 14px;
      border-radius: 16px;
      border:1px solid var(--line);
      cursor:pointer;
      font-weight: 900;
      font-size: 15px;
      background:#fff;
    }
    .btn.primary{
      background: var(--brand);
      border-color: transparent;
      color:#fff;
    }

    /* PDF (PRINT) */
    .pdf{
      display:none;
      padding: 12px;
      background:#fff;
      color:#0b1220;
    }
    /* header accent */
    .pdf .top::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:-1px;
      height:2px;
      background: rgba(11,94,215,.35);
    }

    .pdf .top{
      position:relative;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:18px;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 8px;
      padding-top: 0px;
    }
    .pdf .brand{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      text-align:left;
      gap:6px;
      margin-top:-20px;
    }
    .pdf .brand img{
      width:310px; /* ajuste aqui se quiser */
      height:300px;
      object-fit:contain;
    }
    .pdf .brand h2{
      margin:0;
      margin-top:-10px; /* aproxima do logo */
      font-size:17px;
      font-weight:1000;
      color:#0b1220;
      width:100%;
      text-align:center; /* centralizado */
      letter-spacing:.2px;
    }
    .pdf .datebox{
      text-align:right;
      font-weight:1000;
      color:#111827;
      min-width: 170px;
    }
    .pdf .datebox small{
      display:block;
      color: var(--brand-strong);
      font-weight:1000;
      letter-spacing:.4px;
      text-transform: uppercase;
      font-size: 10px; /* menor */
    }
    .pdf .datebox div{
      font-size: 12px; /* menor */
    }

    .pdf .clientbox{
      border:1px solid #dbeafe;
      background: var(--pdf-soft-blue);
      border-radius: 12px;
      padding: 14px;
      margin-top: 14px;
      min-height: 90px;
      box-shadow: 0 6px 18px rgba(17,24,39,.06);
}
    .pdf .clientbox small{
      color: var(--brand-strong);
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing:.4px;
      display:block;
      margin-bottom: 6px;
    }

    .pdf table{
      width:100%;
      border-collapse:collapse;
      margin-top: 16px;
      font-size: 14px;
    }
    .pdf th{
      text-align:left;
      color: var(--brand-strong); /* azul forte */
      border-bottom:2px solid #0f172a;
      padding: 10px 0;
      font-weight: 1000;
      letter-spacing:.2px;
    }
    .pdf td{
      padding: 12px 0;
      border-bottom:1px solid #eef2f7;
      color:#334155;
      font-weight:800;
    }
    .pdf td:nth-child(2), .pdf th:nth-child(2){ width:70px; text-align:center; }
    .pdf td:nth-child(3), .pdf th:nth-child(3){ width:140px; text-align:right; }

    .pdf .sum{
      margin-top: 16px;
      display:flex;
      justify-content:flex-end;
    }
    .pdf .sum .panel{
      width: 320px;
      border-top: 1px solid #eef2f7;
      padding-top: 12px;
      text-align:right;
      font-weight:1000;
    }
    .pdf .sum .panel .grand{
      display:flex;
      justify-content:space-between;
      align-items:baseline;
      margin-top: 6px;
      color:#0b1220;
      font-weight: 1100;
    }
    .pdf .sum .panel .grand b{
      font-size: 28px;
      letter-spacing:.3px;
    }

    .pdf .bottom{
      margin-top: 10px;
      display:grid;
      grid-template-columns: 1fr;
      gap:10px;
    }
    .pdf .bottom .box{
      border:1px solid #eef2f7;
      border-radius: 12px;
      padding: 14px;
      min-height: 58px;
      width:100%;
      text-align:left;
    }

    .pdf .bottom .value{ text-align:left; }
    .pdf .bottom .box.pay .value{
      font-size: 12px;
      font-weight: 800;
      color:#334155;
      text-align:left;
    }
    .pdf .bottom .box.obs .value{ font-size: 14px; font-weight:800; color:#334155; white-space:pre-wrap; }


    .pdf .bottom .box small{
      color: var(--brand-strong); /* azul forte */
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing:.4px;
      display:block;
      margin-bottom: 6px;
    }

    .pdf .bottom .box.pay small{ font-size: 10px; }


    /* rodapé removido (sem texto) */
    .pdf .footer{ display:none; }

    @media print{
      body{ background:#fff; }
      .wrap, .actions{ display:none !important; }
      .pdf{ display:block !important; }
      @page{ margin: 14mm; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="appbar">
      <h1>Proposta Comercial - Climatização</h1>
      <p>Adicione serviços e gere o PDF.</p>
    </div>

    <div class="section-title">👤 DADOS DO ORÇAMENTO</div>
    <div class="card">
      <div class="grid cols-2">
        <div>
          <label>Nome do Cliente</label>
          <input id="cliente" placeholder="Nome do Cliente" />
        </div>
        <div>
          <label>Telefone / WhatsApp</label>
          <input id="telefone" placeholder="(DD) 9XXXX-XXXX" inputmode="tel" />
        </div>
      </div>

      <div style="margin-top:10px">
        <label>Endereço</label>
        <input id="endereco" placeholder="Endereço (Rua, Nº, Bairro)" />
      </div>

      <div style="margin-top:10px">
        <label>Data</label>
        <input id="data" type="date" />
      </div>
    </div>

    <div class="section-title">🛠️ SERVIÇOS <small>Itens</small></div>
    <div class="card">
      <div id="servicesList" class="grid" style="gap:12px"></div>

      <button class="add" id="btnAdd">
        <span class="plus">+</span> ADICIONAR ITEM
      </button>

      <div style="margin-top:12px">
        <label>Observações</label>
        <textarea id="obs" placeholder="Observações (EX: instalação padrão, 3M de cobre, vácuo no sistema...)"></textarea>
      </div>

      <div class="totals">
        <div class="grand">
          <span>TOTAL GERAL</span>
          <span class="value" id="totalLabel">R$ 0,00</span>
        </div>
      </div>

      <div style="margin-top:12px">
        <label>Forma de pagamento</label>
        <select id="pagamento">
          <option value="">Selecione...</option>
          <option>Dinheiro/Pix</option>
          <option>Cartão</option>
        </select>
      </div>
    </div>
  </div>

  <!-- PDF -->
  <section class="pdf" id="pdf">
    <div class="top">
      <div class="brand">
        <img id="pdfLogo" src="logo.png" alt="logo" onerror="this.style.display='none'"/>
        <div>
          <h2>Proposta Comercial</h2>
        </div>
      </div>
      <div class="datebox">
        <small>Data de emissão</small>
        <div id="pdfData"></div>
      </div>
    </div>

    <div class="clientbox">
      <small>Cliente</small>
      <div id="pdfCliente" style="font-weight:1000; color:#111827"></div>
      <div id="pdfEndereco" style="margin-top:6px; color:#334155; font-weight:800"></div>
      <div id="pdfTelefone" style="margin-top:4px; color:#334155; font-weight:800"></div>
    </div>

    <table>
      <thead>
        <tr>
          <th>DESCRIÇÃO DO SERVIÇO</th>
          <th>QTD</th>
          <th>SUBTOTAL</th>
        </tr>
      </thead>
      <tbody id="pdfTbody"></tbody>
    </table>

    <div class="sum">
      <div class="panel">
        <div class="grand"><span>TOTAL GERAL</span><b id="pdfTotal">R$ 0,00</b></div>
      </div>
    </div>

    <div class="bottom">
      <div class="box obs">
        <small>Observações</small>
        <div class="value" id="pdfObs"></div>
      </div>
      <div class="box pay">
        <small>Forma de pagamento</small>
        <div class="value" id="pdfPagamento"></div>
      </div>
    </div>

    <div class="footer"></div>
  </section>

  <div class="actions">
    <div class="inner">
      <button class="btn" id="btnLimpar">Limpar</button>
      <button class="btn primary" id="btnPdf">Gerar PDF</button>
    </div>
  </div>

<script>
  const brl = new Intl.NumberFormat('pt-BR', { style:'currency', currency:'BRL' });

  function parseBRL(str){
    if(!str) return 0;
    const s = String(str).replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',', '.');
    const n = Number(s);
    return Number.isFinite(n) ? n : 0;
  }

  function todayISO(){
    const d = new Date();
    const tzOff = d.getTimezoneOffset() * 60000;
    return new Date(Date.now()-tzOff).toISOString().slice(0,10);
  }

  const PRESETS = [
    { name: "Instalação Split 9000 a a12000 BTUs", price: 650 },
    { name: "Instalação Split 18000 a 24000 BTUs", price: 800 },
    { name: "Limpeza e Higienização (Simples)", price: 180 },
    { name: "Limpeza Química (Desmontagem Completa)", price: 350 },
    { name: "Instalação Piso Teto / Cassete", price: 1200 },
    { name: "Instalação Multi-Split (Por Evaporadora)", price: 450 },
    { name: "Desinstalação de Equipamento", price: 250 },
    { name: "Aplicaçao de Vácuo no Sistema", price: 180 },
    { name: "Visita Técnica / Diagnostico", price: 150 },
    { name: "Pressurizaçao com Nitrogenio", price: 200 },
    { name: "Carga de Gás", price: 200 },
    { name: "Limpeza Química (Desmontagem Completa)", price: 350 },
  ];

  const state = { items: [] };
  const listEl = document.getElementById('servicesList');

  function addItem(){
    const item = {
      id: crypto.randomUUID(),
      presetIndex: -1,
      desc: "",
      price: 0,
      qty: 1
    };
    state.items.push(item);
    renderItems();
    recalc();
  }

  function removeItem(id){
    state.items = state.items.filter(i => i.id !== id);
    renderItems();
    recalc();
  }

  function setItem(id, patch){
    const it = state.items.find(i => i.id === id);
    if(!it) return;
    Object.assign(it, patch);
    recalc();
  }

  function renderItems(){
    listEl.innerHTML = "";
    if(state.items.length === 0){
      const empty = document.createElement('div');
      empty.style.color = "#6b7280";
      empty.style.fontWeight = "800";
      empty.style.padding = "6px 2px";
      empty.textContent = "Nenhum serviço adicionado. Clique em “ADICIONAR ITEM”.";
      listEl.appendChild(empty);
      return;
    }

    state.items.forEach((it) => {
      const div = document.createElement('div');
      div.className = "service";

      div.innerHTML = `
        <div class="service-top">
          <select aria-label="Serviço">
            <option value="-1">${it.desc ? it.desc : "Selecione..."}</option>
            ${PRESETS.map((p, idx) => `<option value="${idx}">${p.name}</option>`).join('')}
          </select>
          <button class="trash" title="Remover">🗑️</button>
        </div>

        <div class="service-bottom">
          <div class="money">
            <span>R$</span>
            <input inputmode="decimal" placeholder="0,00" value="${(it.price).toFixed(2).replace('.', ',')}" />
          </div>

          <div class="qty" aria-label="Quantidade">
            <button data-act="minus" type="button">-</button>
            <b>${it.qty}</b>
            <button data-act="plus" type="button">+</button>
          </div>
        </div>
      `;

      const sel = div.querySelector('select');
      const trash = div.querySelector('.trash');
      const priceInput = div.querySelector('input');
      const qtyBox = div.querySelector('.qty');
      const qtyLabel = div.querySelector('.qty b');

      sel.addEventListener('change', (e) => {
        const idx = Number(e.target.value);
        if(idx >= 0){
          setItem(it.id, { presetIndex: idx, desc: PRESETS[idx].name, price: PRESETS[idx].price });
          priceInput.value = PRESETS[idx].price.toFixed(2).replace('.', ',');
        }
      });

      trash.addEventListener('click', () => removeItem(it.id));

      priceInput.addEventListener('input', () => {
        setItem(it.id, { price: parseBRL(priceInput.value) });
      });

      qtyBox.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if(!btn) return;
        const act = btn.dataset.act;
        let q = it.qty || 1;
        if(act === "minus") q = Math.max(1, q - 1);
        if(act === "plus") q = q + 1;
        qtyLabel.textContent = q;
        setItem(it.id, { qty: q });
      });

      listEl.appendChild(div);
    });
  }

  const totalLabel = document.getElementById('totalLabel');

  function recalc(){
    let total = 0;
    for(const it of state.items){
      const sub = (Number(it.price) || 0) * (Number(it.qty) || 0);
      total += sub;
    }
    totalLabel.textContent = brl.format(total);
  }

  function escapeHtml(s){
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function fillPDF(){
    const cliente = document.getElementById('cliente').value.trim();
    const endereco = document.getElementById('endereco').value.trim();
    const telefone = document.getElementById('telefone').value.trim();
    const obs = document.getElementById('obs').value.trim();
    const pagamento = document.getElementById('pagamento').value.trim();
    const data = document.getElementById('data').value;

    document.getElementById('pdfCliente').textContent = cliente || "Cliente";
    document.getElementById('pdfEndereco').textContent = endereco || "";
    document.getElementById('pdfTelefone').textContent = telefone || "";
    document.getElementById('pdfObs').textContent = obs || "";
    document.getElementById('pdfPagamento').textContent = pagamento || "";

    const d = data ? new Date(data+"T00:00:00") : new Date();
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const yyyy = d.getFullYear();
    document.getElementById('pdfData').textContent = `${dd}/${mm}/${yyyy}`;

    const tbody = document.getElementById('pdfTbody');
    tbody.innerHTML = "";

    let total = 0;
    state.items.forEach(it => {
      const desc = it.desc || "Serviço";
      const qty = Number(it.qty) || 1;
      const sub = (Number(it.price)||0) * qty;
      total += sub;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${escapeHtml(desc)}</td>
        <td>${qty}</td>
        <td>${brl.format(sub)}</td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById('pdfTotal').textContent = brl.format(total);
  }

  document.getElementById('btnAdd').addEventListener('click', addItem);

  document.getElementById('btnPdf').addEventListener('click', () => {
    fillPDF();
    window.print();
  });

  document.getElementById('btnLimpar').addEventListener('click', () => {
    state.items = [];
    renderItems();
    document.getElementById('cliente').value = "";
    document.getElementById('endereco').value = "";
    document.getElementById('telefone').value = "";
    document.getElementById('obs').value = "";
    document.getElementById('pagamento').value = "";
    document.getElementById('data').value = todayISO();
    recalc();
  });

  // init
  document.getElementById('data').value = todayISO();
  renderItems(); // começa zerado
  recalc();
</script>
</body>
</html>
