<!doctype html>
<html>
<body>
<script>
  const slug = "robsonextecoetter";
  const path = location.pathname.replace(/\/$/, "");
  const base = path.split("/clientes/")[0];
  const target = base + "/app/index.html?c=" + encodeURIComponent(slug);

  document.body.innerHTML =
    "<pre>" +
    "pathname: " + location.pathname + "\n" +
    "base: " + base + "\n" +
    "target: " + target + "\n\n" +
    "</pre>" +
    "<a href='" + target + "'>Abrir app</a>";
</script>
</body>
</html>
